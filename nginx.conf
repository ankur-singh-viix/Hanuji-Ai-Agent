events { worker_connections 1024; }

http {
  upstream api_gateway    { server api-gateway:3000; }
  upstream agent_service  { server agent-service:3001; }
  upstream webhook_service{ server webhook-service:3002; }
  upstream n8n_service    { server n8n:5678; }

  server {
    listen 80;
    server_name _;

    # Frontend
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }

    # API Gateway
    location /api/ {
      proxy_pass http://api_gateway;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket
    location /ws {
      proxy_pass http://api_gateway;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    # Webhooks
    location /webhooks/ {
      proxy_pass http://webhook_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_read_timeout 10s;
    }

    # n8n
    location /n8n/ {
      proxy_pass http://n8n_service/;
      proxy_set_header Host $host;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
