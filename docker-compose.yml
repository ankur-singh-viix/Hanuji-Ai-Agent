version: '3.9'

services:
  nginx:
    image: nginx:alpine
    container_name: hanuji-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
      - frontend
    restart: unless-stopped

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: hanuji-api
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  agent-service:
    build:
      context: ./services/agent-service
      dockerfile: Dockerfile
    container_name: hanuji-agent
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  webhook-service:
    build:
      context: ./services/webhook-service
      dockerfile: Dockerfile
    container_name: hanuji-webhook
    env_file: .env
    environment:
      - NODE_ENV=production
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hanuji-frontend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: hanuji-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hanuji-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: hanuji-n8n
    env_file: .env
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  n8n_data:
